# Canonical cargo-mutants configuration for mega-evm mutation testing.
#
# This file is auto-discovered by `cargo mutants`. The mutation-testing pipeline
# (scripts/mutation_test.sh + scripts/mutation_gate.py) layers diff-scoping,
# suppression metadata, and PR gating on top of it. See mutants/README.md.
#
# Scope: only `mega-evm` is mutated. `mega-system-contracts` produces 0 mutants
# (its src/ is generated bytecode artifacts), so it is intentionally absent.

# Run tests with nextest (the project's standard runner) and restrict the test
# command to the mutated package for speed.
test_tool = "nextest"
test_package = ["mega-evm"]

# Pin the feature set. Which code is `cfg`-compiled (and therefore visible to
# mutate) depends on enabled features, so local and CI runs MUST agree or they
# generate different mutant populations. `--all-features` is applied to every
# cargo invocation (build + test) so generation and outcomes stay reproducible.
additional_cargo_args = ["--all-features"]

# Never mutate generated code or test-only helpers: a mutation there is noise,
# not a signal about the production test suite.
exclude_globs = [
    "**/generated/**",
    "**/test_utils/**",
    "**/test_utils.rs",
]

# Give slow EVM-execution tests headroom before a mutant is ruled a timeout
# (a timeout is treated as "could not decide", not as a survivor).
minimum_test_timeout = 120
timeout_multiplier = 3.0
