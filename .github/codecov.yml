coverage:
  range: 80..100
  round: down
  precision: 1
  status:
    project:
      mega-evm-core:
        threshold: 1%
    patch:
      mega-evm-core:
        target: auto
        threshold: 1%
        base: auto
        only_pulls: true

comment:
  layout: "condensed_header, condensed_files, condensed_footer"
  require_changes: true
  hide_project_coverage: false

ignore:
  - "bin/**/*"
  - "crates/state-test/**/*"
  - "crates/system-contracts/**/*"
  - "crates/mega-evm/benches/**/*"
  - "crates/mega-evm/src/external/test_utils.rs"
  - "crates/mega-evm/src/test_utils/**/*"
  - "crates/mega-evm/tests/**/*"

flag_management:
  individual_flags:
    - name: mega-evm-core
      statuses:
        - type: project
          target: auto
          threshold: 1%

fixes:
  - "/home/runner/work/mega-evm/mega-evm/::"
