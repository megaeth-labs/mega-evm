name: Criterion Benchmark

on:
  schedule:
    - cron: '0 2 * * 1' # Weekly Monday 2am UTC
  workflow_dispatch:
    inputs:
      aa_check:
        description: 'A/A self-check: compare HEAD against itself to measure the noise floor (no real change should be flagged).'
        type: boolean
        default: false
  issue_comment:
    types: [created]

# The group is suffixed with "is this a real trigger": issue_comment fires for
# EVERY new comment (codecov, mutation bots, humans chatting), and with a single
# group + cancel-in-progress an unrelated comment lands in the same group and
# cancels a live benchmark mid-flight. Non-trigger comment runs now share their
# own group and only ever cancel each other; real runs still debounce real
# re-triggers.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number || github.ref }}-${{ github.event_name != 'issue_comment' || contains(github.event.comment.body, '/benchmark') }}
  cancel-in-progress: true

# Paired, order-interleaved A/B knobs. The harness runs the feature and baseline
# bench binaries back-to-back for BENCH_ROUNDS short rounds (A B / B A / ...),
# then takes the mean of the per-round paired Δ% with a bootstrap CI. Short
# per-round configs keep the wall-clock close to the old single sequential pass;
# precision is recovered across rounds, not within one. Tune here.
env:
  # Keep BENCH_ROUNDS even: the within-pair order alternates each round
  # (feature-first / baseline-first), so an even count runs each side first
  # exactly as often and the order-effect cancels in the mean. An odd count
  # leaves a one-round imbalance that biases even the A/A self-check.
  BENCH_ROUNDS: '16'
  BENCH_SAMPLE_SIZE: '10'
  BENCH_WARMUP: '0.2'
  BENCH_MEAS: '0.5'
  BOOTSTRAP_ITERS: '2000'

# Least privilege by default: only the jobs that post to the PR get write, and
# the job that compiles + runs untrusted PR code (`bench`) gets read-only — so a
# malicious PR run with `/benchmark` has no write-scoped token to abuse.
permissions:
  contents: read

jobs:
  # Resolve the exact commits ONCE, up front. Every bench job then checks out
  # these fixed SHAs, so a push to the PR while the run is queued/in-flight
  # cannot make different jobs measure different code (or mislabel the result).
  prepare:
    name: Resolve commits
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    # Reacts to the triggering comment; does not execute PR code.
    # `issues: write` is required to react to the (issue) comment — PR
    # conversation comments live under the issues API; `pull-requests: write`
    # does not cover their reactions.
    permissions:
      contents: read
      issues: write
      pull-requests: write
    if: >-
      github.event_name != 'issue_comment' || (
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '/benchmark') &&
        (github.event.comment.author_association == 'MEMBER' ||
         github.event.comment.author_association == 'COLLABORATOR' ||
         github.event.comment.author_association == 'OWNER')
      )
    outputs:
      feature_sha: ${{ steps.resolve.outputs.feature_sha }}
      baseline_sha: ${{ steps.resolve.outputs.baseline_sha }}
      compare: ${{ steps.resolve.outputs.compare }}
      aa_check: ${{ steps.resolve.outputs.aa_check }}
    steps:
      # Resolve the feature/baseline commits via the API ONLY — no checkout and
      # no fetch of the PR ref. This write-privileged job therefore never brings
      # untrusted PR code (or even a PR-controlled ref) into the workspace; the
      # actual PR code is only ever materialized in the read-only `bench` job.
      - name: Resolve commits and react
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'workflow_dispatch' &&
                context.payload.inputs && context.payload.inputs.aa_check === 'true') {
              // A/A self-check: compare the checked-out commit against ITSELF.
              // A correctly-paired harness must flag nothing — the spread it
              // measures is the pure noise floor.
              core.setOutput('feature_sha', context.sha);
              core.setOutput('baseline_sha', context.sha);
              core.setOutput('compare', 'true');
              core.setOutput('aa_check', 'true');
              return;
            }
            if (context.eventName !== 'issue_comment') {
              // schedule / workflow_dispatch: benchmark the checked-out ref,
              // no baseline comparison.
              core.setOutput('feature_sha', context.sha);
              core.setOutput('baseline_sha', '');
              core.setOutput('compare', 'false');
              core.setOutput('aa_check', 'false');
              return;
            }
            const { owner, repo } = context.repo;
            const pull_number = context.payload.issue.number;
            const pr = await github.rest.pulls.get({ owner, repo, pull_number });
            const featureSha = pr.data.head.sha;
            // GitHub's compare endpoint returns the merge-base of the PR base
            // branch and the PR head — same commit `git merge-base` would pick.
            const cmp = await github.rest.repos.compareCommitsWithBasehead({
              owner,
              repo,
              basehead: `${pr.data.base.ref}...${featureSha}`,
            });
            const baselineSha = cmp.data.merge_base_commit.sha;
            core.setOutput('feature_sha', featureSha);
            core.setOutput('baseline_sha', baselineSha);
            core.setOutput('compare', 'true');
            core.setOutput('aa_check', 'false');
            core.info(`Feature: ${featureSha}  Baseline: ${baselineSha}`);
            // Best-effort acknowledgement: the outputs above are already set, so
            // a failed reaction must NOT fail this job (which would skip bench +
            // compare). Swallow any error and carry on.
            try {
              await github.rest.reactions.createForIssueComment({
                owner,
                repo,
                comment_id: context.payload.comment.id,
                content: 'rocket',
              });
            } catch (e) {
              core.warning(`could not add :rocket: reaction: ${e.message}`);
            }

  # One job per bench target. Each job builds BOTH the feature and baseline bench
  # binaries up front (no rebuild during measurement), then runs them paired and
  # order-interleaved on the SAME runner for BENCH_ROUNDS short rounds. Pairing
  # the two sides inside each round cancels the runner's slow drift, which the
  # old "whole feature suite, then whole baseline suite" pass turned into a
  # ±2-5% phantom delta. Jobs run in parallel across targets.
  bench:
    name: Bench ${{ matrix.target }}
    needs: prepare
    runs-on: ubuntu-24.04
    # Paired interleaving runs each round's measurement ~1.5x the old single
    # pass, and re-pays per-bench setup once per round; give heavy-setup targets
    # (block_bench / attack_replay / comp_cost) generous headroom. Well under the
    # 6h hosted-runner job cap. Lower BENCH_ROUNDS in env to trade back time.
    timeout-minutes: 180
    # This job compiles and runs untrusted PR code — keep it read-only so there
    # is no write-scoped token to exfiltrate. `pull-requests: read` lets
    # `gh pr checkout` resolve the (fork) PR head.
    permissions:
      contents: read
      pull-requests: read
    strategy:
      fail-fast: false
      matrix:
        target: [revm_bench, mega_bench, block_bench, transact, comp_cost, ctt, attack_replay]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # Pin the measurement runner to the TRUSTED base-repo version. The initial
      # checkout above is the default branch (for issue_comment events), so this
      # copy is taken before any `git checkout <feature_sha>` swaps in PR code —
      # a PR cannot alter how its own numbers are collected.
      - name: Stash measurement script
        run: |
          mkdir -p "$RUNNER_TEMP/scripts"
          cp .github/scripts/bench_paired.sh "$RUNNER_TEMP/scripts/"
          chmod +x "$RUNNER_TEMP/scripts/bench_paired.sh"

      # Fetch the PR head commit by its pull ref, which GitHub keeps in the base
      # repo for fork PRs and even after the source branch is deleted (merged
      # PRs) — unlike `gh pr checkout`, which needs the source branch to exist.
      # `git checkout <feature_sha>` below then resolves against the fetched
      # commit.
      - name: Fetch PR head
        if: github.event_name == 'issue_comment'
        run: git fetch --no-tags origin "pull/${{ github.event.issue.number }}/head"

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      # Build the feature bench binary without running it, capture its path from
      # cargo's JSON output, and copy it out of target/ so a later baseline build
      # (or working-tree checkout) cannot disturb it.
      - name: Build feature bench binary
        run: |
          git checkout --quiet ${{ needs.prepare.outputs.feature_sha }}
          git submodule update --init --recursive
          bin=$(cargo bench --no-run -p mega-evm --bench ${{ matrix.target }} --message-format=json \
            | jq -r 'select(.reason=="compiler-artifact" and .target.name=="${{ matrix.target }}" and (.target.kind|index("bench")) and .executable!=null) | .executable' \
            | tail -1)
          test -n "$bin" || { echo "could not locate feature bench binary"; exit 1; }
          cp "$bin" "$RUNNER_TEMP/feature_bin"
          echo "feature bench binary: $bin"

      # Build the baseline binary too (skipped for the A/A self-check, where it
      # is identical, and when the target did not exist at the baseline commit).
      - name: Build baseline bench binary
        if: needs.prepare.outputs.compare == 'true'
        run: |
          if [ "${{ needs.prepare.outputs.aa_check }}" = "true" ]; then
            cp "$RUNNER_TEMP/feature_bin" "$RUNNER_TEMP/baseline_bin"
            echo "A/A self-check: baseline binary = feature binary"
            exit 0
          fi
          git checkout --quiet ${{ needs.prepare.outputs.baseline_sha }}
          git submodule update --init --recursive
          if ! grep -q 'name = "${{ matrix.target }}"' crates/mega-evm/Cargo.toml; then
            echo "target '${{ matrix.target }}' absent at baseline commit — feature-only"
            exit 0
          fi
          bin=$(cargo bench --no-run -p mega-evm --bench ${{ matrix.target }} --message-format=json \
            | jq -r 'select(.reason=="compiler-artifact" and .target.name=="${{ matrix.target }}" and (.target.kind|index("bench")) and .executable!=null) | .executable' \
            | tail -1)
          test -n "$bin" || { echo "could not locate baseline bench binary"; exit 1; }
          cp "$bin" "$RUNNER_TEMP/baseline_bin"
          echo "baseline bench binary: $bin"

      # Check out the feature working tree so BOTH prebuilt binaries read the same
      # (PR) fixtures at runtime — a fair comparison on identical inputs.
      - name: Prepare measurement working tree
        run: |
          git checkout --quiet ${{ needs.prepare.outputs.feature_sha }}
          git submodule update --init --recursive

      - name: Run paired interleaved benchmark
        if: needs.prepare.outputs.compare == 'true'
        run: |
          mkdir -p rounds
          baseline_bin=""
          [ -f "$RUNNER_TEMP/baseline_bin" ] && baseline_bin="$RUNNER_TEMP/baseline_bin"
          "$RUNNER_TEMP/scripts/bench_paired.sh" \
            "${{ matrix.target }}" \
            "$RUNNER_TEMP/feature_bin" \
            "$baseline_bin" \
            rounds \
            "$BENCH_ROUNDS" "$BENCH_SAMPLE_SIZE" "$BENCH_WARMUP" "$BENCH_MEAS"

      # Schedule / dispatch (no comparison): one full-config feature run, kept for
      # the artifact history only — there is no PR to comment on.
      - name: Run standalone benchmark
        if: needs.prepare.outputs.compare != 'true'
        run: |
          "$RUNNER_TEMP/feature_bin" --bench --output-format bencher --noplot \
            | tee "feature_${{ matrix.target }}.txt"

      - name: Upload round results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-rounds-${{ matrix.target }}
          path: |
            rounds/
            feature_${{ matrix.target }}.txt
          if-no-files-found: ignore

  # Join all per-target round files and post the comparison comment. Cheap (no
  # compile, no benches) so it gets a short budget.
  compare:
    name: Compare and comment on PR
    needs: [prepare, bench]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    if: needs.prepare.outputs.compare == 'true'
    # Posts the comparison comment; consumes artifacts plus the TRUSTED base-repo
    # aggregation script (checked out below from the default branch, never PR
    # code).
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download all round results
        uses: actions/download-artifact@v4
        with:
          pattern: bench-rounds-*
          path: all_rounds
          merge-multiple: true

      - name: Aggregate rounds into a comparison
        env:
          # Point at the download root; upload-artifact collapses the `rounds/`
          # prefix, so the round files land directly under here. The comparator
          # globs recursively, so a one-level-deeper layout also works.
          ROUNDS_DIR: all_rounds
          OUT: comparison.md
          FEATURE_SHA: ${{ needs.prepare.outputs.feature_sha }}
          BASELINE_SHA: ${{ needs.prepare.outputs.baseline_sha }}
          REPO_URL: ${{ github.event.repository.html_url }}
          AA_CHECK: ${{ needs.prepare.outputs.aa_check }}
          BOOTSTRAP_ITERS: ${{ env.BOOTSTRAP_ITERS }}
        run: |
          mkdir -p all_rounds
          python3 .github/scripts/bench_compare.py

      - name: Comment on PR
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('comparison.md', 'utf8');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Upload comparison
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: criterion-benchmark-results
          path: |
            comparison.md
            all_rounds
