name: Mutation Testing

on:
  workflow_dispatch:
  pull_request:
  schedule:
    # Nightly full-crate run. The diff gate never mutates #[cfg(test)] code, so
    # the in-repo mutation-killing tests are only re-verified here, against the
    # real source — catching a killing test that has silently stopped killing.
    - cron: "0 3 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write # to upsert the result comment

jobs:
  diff-mutants:
    name: diff-scoped mutation gate
    runs-on: ubuntu-24.04
    # Diff-scoped PR runs finish in minutes; the nightly full-crate run needs
    # much longer headroom.
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0 # need base history for the diff

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          # Pin the version: a new cargo-mutants release can change the set of
          # generated mutants, which would silently shift the gate's baseline.
          tool: cargo-mutants@27.1.0

      - name: Run mutation testing
        # On a PR: mutate only the changed lines (fast gate). On manual dispatch
        # there is no PR base, so run the whole crate as an on-demand baseline
        # instead of feeding an empty base into `diff` mode (which would fail).
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            scripts/mutation_test.sh diff "${{ github.event.pull_request.base.sha }}"
          else
            scripts/mutation_test.sh full
          fi

      - name: Score and gate
        id: gate
        run: |
          python3 scripts/mutation_gate.py report \
            --results target/mutants/mutants.out \
            --suppressions mutants/suppressions.toml \
            --comment mutation-report.md \
            --summary "$GITHUB_STEP_SUMMARY"

      - name: Upsert PR comment
        # Fork / Dependabot PRs run with a read-only token, so commenting fails;
        # don't let that fail the gate job.
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body;
            try {
              body = fs.readFileSync('mutation-report.md', 'utf8');
            } catch {
              body = '## 🧬 Mutation testing\n\nNo report produced (no mega-evm changes to mutate).';
            }
            const marker = '<!-- mutation-testing-report -->';
            body = `${marker}\n${body}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, per_page: 100,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

      - name: Upload mutation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-results
          path: |
            target/mutants/mutants.out
            target/mutants.diff
            mutation-report.md
          if-no-files-found: ignore
