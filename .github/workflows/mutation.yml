name: Mutation Testing

on:
  workflow_dispatch:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write # to upsert the result comment

jobs:
  diff-mutants:
    name: diff-scoped mutation gate
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0 # need base history for the diff

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          # Pin the version: a new cargo-mutants release can change the set of
          # generated mutants, which would silently shift the gate's baseline.
          tool: cargo-mutants@27.1.0

      - name: Run diff-scoped mutation testing
        run: scripts/mutation_test.sh diff "${{ github.event.pull_request.base.sha }}"

      - name: Score and gate
        id: gate
        run: |
          python3 scripts/mutation_gate.py report \
            --results target/mutants/mutants.out \
            --suppressions mutants/suppressions.toml \
            --comment mutation-report.md \
            --summary "$GITHUB_STEP_SUMMARY"

      - name: Upsert PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body;
            try {
              body = fs.readFileSync('mutation-report.md', 'utf8');
            } catch {
              body = '## 🧬 Mutation testing\n\nNo report produced (no mega-evm changes to mutate).';
            }
            const marker = '<!-- mutation-testing-report -->';
            body = `${marker}\n${body}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

      - name: Upload mutation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-results
          path: |
            target/mutants/mutants.out
            target/mutants.diff
            mutation-report.md
          if-no-files-found: ignore
