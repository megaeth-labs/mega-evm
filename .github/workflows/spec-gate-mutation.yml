name: Spec-Gate Mutation

# Custom-operator (universalmutator + comby) mutation testing for backward-compat
# spec gates. Complements the cargo-mutants gate (.github/workflows/mutation.yml)
# and shares its scorer (scripts/mutation_gate.py). See mutants/README.md.

on:
  workflow_dispatch:
  pull_request:
  schedule:
    - cron: "0 4 * * *" # nightly full-crate sweep

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write # to upsert the result comment

jobs:
  # Diff-scoped blocking gate: only files+lines the PR changed are mutated, so
  # most PRs generate zero spec-gate mutants and this is near-instant.
  pr-gate:
    name: diff-scoped spec-gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0 # need base history for the diff
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - name: Install universalmutator (mise)
        uses: jdx/mise-action@v2
      - name: Install comby
        # The prebuilt comby links against libev/libpcre, which are not on the
        # runner by default — install them before the official installer runs.
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcre3 libev4
          bash <(curl -sL get.comby.dev)
      - name: Run diff-scoped spec-gate mutation
        run: |
          python3 scripts/umutate.py run --packs spec-gate \
            --diff "${{ github.event.pull_request.base.sha }}" \
            --output target/umutate
      - name: Score and gate
        run: |
          python3 scripts/mutation_gate.py report \
            --results target/umutate \
            --suppressions mutants/suppressions.toml \
            --comment spec-gate-report.md \
            --summary "$GITHUB_STEP_SUMMARY"
      - name: Upsert PR comment
        # Fork / Dependabot PRs run with a read-only token; don't fail on that.
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body;
            try {
              body = fs.readFileSync('spec-gate-report.md', 'utf8');
            } catch {
              body = '## 🧬 Spec-gate mutation\n\nNo report produced.';
            }
            const marker = '<!-- spec-gate-mutation-report -->';
            body = `${marker}\n${body}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, per_page: 100,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spec-gate-mutation-diff
          path: |
            target/umutate
            spec-gate-report.md
          if-no-files-found: ignore

  # Nightly full sweep, sharded by subsystem so each job stays bounded
  # (analyze_mutants is sequential). Informational: it surfaces survivors but
  # does not fail the workflow — triage them into suppressions.toml or with tests.
  nightly:
    name: full sweep (${{ matrix.subsystem }})
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 330
    strategy:
      fail-fast: false
      matrix:
        subsystem: [evm, limit, block, access, external, system, sandbox]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - name: Install universalmutator (mise)
        uses: jdx/mise-action@v2
      - name: Install comby
        # The prebuilt comby links against libev/libpcre, which are not on the
        # runner by default — install them before the official installer runs.
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcre3 libev4
          bash <(curl -sL get.comby.dev)
      - name: Run spec-gate mutation (${{ matrix.subsystem }})
        run: |
          python3 scripts/umutate.py run --packs spec-gate \
            --files "crates/mega-evm/src/${{ matrix.subsystem }}/*" \
            --output "target/umutate/${{ matrix.subsystem }}"
      - name: Score (informational)
        run: |
          python3 scripts/mutation_gate.py report \
            --results "target/umutate/${{ matrix.subsystem }}" \
            --suppressions mutants/suppressions.toml \
            --summary "$GITHUB_STEP_SUMMARY" || true
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spec-gate-mutation-${{ matrix.subsystem }}
          path: target/umutate/${{ matrix.subsystem }}
          if-no-files-found: ignore
