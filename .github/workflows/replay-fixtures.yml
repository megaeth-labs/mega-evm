name: Replay Fixtures
on:
  workflow_call:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  replay:
    name: Replay corpus (offline correctness guard)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Build state-test
        run: cargo build --release -p state-test
      # Re-executes every committed replay fixture in isolation and checks the
      # recorded gas / status / roots. No RPC access — deterministic. A failure
      # means a Rust change altered execution for a covered spec.
      - name: Replay fixture corpus
        run: ./target/release/state-test crates/state-test/tests/fixtures/replay
