name: Claude Code
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_target:
    types: [opened, synchronize, ready_for_review, reopened, labeled, unlabeled]
  issues:
    types: [opened]

jobs:
  interactive:
    if: |
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@claude') &&
       (github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR' ||
        github.event.comment.author_association == 'OWNER'))  ||
      (github.event_name == 'pull_request_review_comment' &&
       contains(github.event.comment.body, '@claude') &&
       (github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR' ||
        github.event.comment.author_association == 'OWNER')) ||
      (github.event_name == 'pull_request_review' &&
       contains(github.event.review.body, '@claude') &&
       (github.event.review.author_association == 'MEMBER' ||
        github.event.review.author_association == 'COLLABORATOR' ||
        github.event.review.author_association == 'OWNER'))
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Check write permission
        id: permission
        uses: actions/github-script@v7
        with:
          script: |
            const event = context.eventName;
            let username;
            if (event === 'issue_comment' || event === 'pull_request_review_comment') {
              username = context.payload.comment.user.login;
            } else if (event === 'pull_request_review') {
              username = context.payload.review.user.login;
            }
            if (!username) return false;
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username,
            });
            const hasWrite = ['admin', 'write'].includes(data.permission);
            console.log(`User ${username} has permission: ${data.permission} (write access: ${hasWrite})`);
            return hasWrite;
          result-encoding: string

      - uses: anthropics/claude-code-action@v1
        if: steps.permission.outputs.result == 'true'
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          claude_args: |
            --allowedTools "Read,Write,Edit,Glob,Grep,mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr checks:*),Bash(gh pr edit:*),Bash(gh pr list:*),Bash(gh issue view:*),Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh issue list:*),Bash(gh label list:*),Bash(gh run view:*),Bash(gh run list:*),Bash(git log:*),Bash(git diff:*),Bash(git show:*),Bash(git blame:*),Bash(git status:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(git checkout:*),Bash(cargo:*),Bash(ls:*),Bash(tree:*)"

  pr-review:
    if: |
      github.event_name == 'pull_request_target' &&
      (github.event.action == 'opened' ||
       github.event.action == 'synchronize' ||
       github.event.action == 'ready_for_review' ||
       github.event.action == 'reopened')
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          submodules: recursive
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          claude_args: |
            --allowedTools "Read,Glob,Grep,mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr checks:*),Bash(gh label list:*),Bash(gh run view:*),Bash(gh run list:*),Bash(git log:*),Bash(git diff:*),Bash(git show:*),Bash(git blame:*),Bash(git status:*),Bash(ls:*),Bash(tree:*)"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request following the guidelines in CLAUDE.md and REVIEW.md.

            ## Documentation scope exclusion

            Do NOT check whether documentation under `docs/` needs updating based on the code changes.
            A separate `doc-impact` job handles documentation impact analysis.
            You may still review changes to doc files if they are part of the PR diff, but do not proactively suggest doc updates for code changes.

            ## Conversation awareness

            Before posting any feedback:
            1. Read the existing PR comments and review threads using `gh pr view --comments` and `gh pr view --json reviews`.
            2. Check which review threads are already resolved vs unresolved.
            3. Do NOT re-raise points that have already been addressed or resolved in the conversation history.
            4. Do NOT repeat feedback that you or another bot already posted on this PR.
            5. If this is a `synchronize` event (new push), focus your review on the new changes and whether previous feedback was addressed. Do not re-review unchanged code.

            ## Review style

            - Calibrate review effort to the size and risk of the PR. A trivial getter does not need the same scrutiny as a new opcode.
            - Be concise. Batch all feedback into ONE top-level `gh pr comment` and a small number of inline comments. Do NOT post multiple top-level comments.
            - Only comment on issues that actually matter. Skip trivial style nits that don't affect correctness or maintainability.
            - Never repeat the same point in multiple places. Say it once, in the most relevant location.
            - If the PR is clean or all prior feedback has been addressed, a single "LGTM" comment is sufficient. Do not manufacture feedback just to have something to say.

            Use `gh pr comment` for top-level feedback (exactly one comment).
            Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) to highlight specific code issues.

  doc-impact:
    if: |
      github.event_name == 'pull_request_target' &&
      (github.event.action == 'opened' ||
       github.event.action == 'synchronize' ||
       github.event.action == 'ready_for_review' ||
       github.event.action == 'reopened')
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          submodules: recursive
          fetch-depth: 1

      - name: Check for source code changes
        id: filter
        run: |
          FILES=$(gh pr diff ${{ github.event.pull_request.number }} --name-only || true)
          if echo "$FILES" | grep -qE '^crates/mega-evm/src/|^crates/system-contracts/'; then
            echo "has_source_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_source_changes=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: anthropics/claude-code-action@v1
        if: steps.filter.outputs.has_source_changes == 'true'
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --allowedTools "Read,Glob,Grep,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*),Bash(git log:*),Bash(git diff:*),Bash(git show:*),Bash(ls:*),Bash(tree:*)"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are a documentation impact checker for the MegaETH specification.
            Your ONLY job is to determine if this PR's code changes require updates to docs/ or agent files (AGENTS.md, CLAUDE.md, docs/AGENTS.md, REVIEW.md, .claude/skills/*/SKILL.md).

            Follow the doc-impact-check skill instructions in .claude/skills/doc-impact-check/SKILL.md.

            Key rules:
            - Read the PR diff using `gh pr diff`.
            - Only analyze behavioral code changes (skip tests, CI, refactoring).
            - Map code changes to affected doc pages AND agent files using both mapping tables (spec docs and agent/skill files).
            - Check if the PR already includes updates for the affected files.
            - If updates are needed and missing, post exactly ONE comment via `gh pr comment`.
            - If no updates are needed, or the PR already includes them, do NOT post any comment.
            - Do NOT review code quality — the pr-review job handles that.

            Before commenting, check existing PR comments using `gh pr view --comments`.
            If you already posted a doc-impact comment on this PR:
            - If the doc updates have been addressed, delete your previous comment using `gh api`.
            - If there are still gaps but they changed, edit your existing comment.
            - Do NOT post duplicate comments.

  label-check:
    if: |
      github.event_name == 'pull_request_target' &&
      (github.event.action == 'opened' ||
       github.event.action == 'reopened' ||
       github.event.action == 'labeled' ||
       github.event.action == 'unlabeled') &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Debounce
        run: sleep 15

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          submodules: recursive
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --allowedTools "Read,Glob,Grep,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh api:*),Bash(gh label list:*),Bash(git log:*),Bash(git diff:*),Bash(ls:*)"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Check if the current labels on this PR are correct.

            Read the PR diff using `gh pr diff` and check the current labels using `gh pr view`.
            Fetch the complete list of available labels using `gh label list`.

            Before commenting, check existing PR comments using `gh pr view --comments`.
            If you already posted a label-related comment on this PR:
            - If the labels have been fixed to match your suggestions, delete your previous comment using `gh api` — the feedback is no longer relevant.
            - If there are still label issues but they changed, edit your existing comment using `gh pr comment --edit-last` instead of posting a new one.
            - If the labels are unchanged from your previous comment, do nothing.
            Only post a NEW comment if there is no prior label-related comment from you AND there are label issues to report.

            If any labels are incorrect or missing, post exactly ONE comment explaining all label issues.
            Do NOT add or remove labels yourself. Only comment.
            If all labels look correct, do nothing — no comment needed.

  issue-triage:
    if: github.event_name == 'issues'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --allowedTools "Read,Glob,Grep,Bash(gh issue view:*),Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh label list:*),Bash(ls:*)"
          prompt: |
            REPO: ${{ github.repository }}
            ISSUE NUMBER: ${{ github.event.issue.number }}

            Triage this newly opened issue.

            1. Read the issue using `gh issue view ${{ github.event.issue.number }}`.
            2. Fetch available labels using `gh label list`.
            3. Based on the issue content and the codebase, apply the appropriate labels using `gh issue edit ${{ github.event.issue.number }} --add-label "label1,label2"`.
            4. Remove the `triage:needed` label using `gh issue edit ${{ github.event.issue.number }} --remove-label "triage:needed"`.
            5. If the issue is unclear or you are not confident about the labels, leave `triage:needed` and add a comment asking for clarification.
