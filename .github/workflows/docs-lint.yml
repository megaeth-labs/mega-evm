name: Docs Lint
on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress 'docs/**/*.md'
          fail: true

      - name: Lint Markdown
        run: npx markdownlint-cli2
