name: Auto Triage
on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  add-triage-label:
    runs-on: ubuntu-24.04
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Add triage:needed label
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "issues" ]; then
            gh issue edit ${{ github.event.issue.number }} --repo ${{ github.repository }} --add-label "triage:needed"
          else
            gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --add-label "triage:needed"
          fi
