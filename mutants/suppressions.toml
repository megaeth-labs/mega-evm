# --- DeterministicHasher::write line-109 `> 16` -> `>= 16` (equivalent) ------------
# `if data.len() > 16 { large branch } else { mid branch }`. The `>=` mutant only diverges
# from `>` at the boundary len == 16. There both branches produce the SAME single
# `large_update(value)` call with the SAME u128:
#   * mid branch (taken by `>`):  front = le_u64(bytes[0..8]), back = le_u64(bytes[8..16]),
#     value = (front as u128) | ((back as u128) << 64) = le_u128(bytes[0..16]).
#   * large branch (taken by `>=`): value = read_last_u128() = le_u128(bytes[0..16]) (split_at
#     at len-16 == 0 reads the whole 16-byte slice), then `while data.len() > 16` is false, so
#     NO loop pass runs and no extra update happens.
# Both paths therefore feed the identical little-endian u128 to a single large_update, yielding
# the identical buffer and bucket id. (Pinning a len-16 input cannot kill it; the test
# ahash_bucket_id_len16 was removed for this reason.) The two SIBLING `> 16` -> `>= 16` mutants
# that share this same mutant text — line 108 (`> 8`) and the line-112 loop guard — are NOT
# equivalent and are killed by ahash_bucket_id_len8_boundary_is_pinned /
# ahash_bucket_id_len32_loop_boundary_is_pinned; cargo-mutants reports them CAUGHT, so only the
# line-109 survivor reaches this filter.
[[suppress]]
kind = "line"
file = "crates/mega-evm/src/external/hasher/fallback.rs"
mutant = "replace > with >= in <impl core::hash::Hasher for DeterministicHasher>::write"
justification = "Equivalent (line 109 `> 16`): the > vs >= boundary only differs at len == 16, where both the mid branch (front | (back<<64)) and the large branch (read_last_u128, with no loop pass since 16 is not > 16) feed the identical le_u128(bytes[0..16]) to a single large_update. Same buffer, same bucket id; no input distinguishes them. The line-108 and line-112 mutants sharing this text are non-equivalent and are caught by the len-8 / len-32 tests."
reviewer = "improve-mutation-score"
