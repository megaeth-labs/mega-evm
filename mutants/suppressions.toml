# --- effective_remaining_for_rescue boundary (equivalent) -------------------------
#
# `if stipend > 0 { gas.remaining().min(gas.limit() - stipend) } else { gas.remaining() }`.
# The `> 0` -> `>= 0` mutant only diverges when `stipend == 0`, in which case the then-
# branch computes `gas.remaining().min(gas.limit() - 0) = gas.remaining().min(gas.limit())`.
# Since `gas.remaining() <= gas.limit()` is invariant in revm (remaining starts at limit and
# only decreases; the REX4 stipend inflates both limit and remaining together), this equals
# `gas.remaining()` — identical to the else-branch. The four other mutants in this function
# are caught by the rex4 storage_call_stipend tests; only this true boundary equivalent
# survives.
[[suppress]]
kind = "line"
file = "crates/mega-evm/src/limit/storage_call_stipend.rs"
mutant = "replace > with >= in StorageCallStipendTracker::effective_remaining_for_rescue"
justification = "Equivalent: the > vs >= boundary only differs when stipend == 0, where the then-branch reduces to gas.remaining().min(gas.limit()) == gas.remaining() (the else-branch) because remaining <= limit is invariant. No reachable input observes the difference."
reviewer = "improve-mutation-score (William Aaron Cheung)"

# --- before_frame_return_result de-dup flag (equivalent) --------------------------
#
# `let duplicate_return_frame_result = LAST_FRAME && !has_active_frame();`. The `&&` -> `||`
# mutant can only diverge when (a) LAST_FRAME is true while a frame is still active, or
# (b) LAST_FRAME is false while no frame is active. Neither is reachable: the `<true>`
# (`last_frame_result`) call always runs after the frame's tracker has already been popped
# by the preceding `<false>` (`frame_return_result`) pass, so `has_active_frame()` is always
# false at `<true>` calls (making `&& X` == `|| X` == true); and at `<false>` calls
# LAST_FRAME is false. The full mega-evm suite — including all nested/parent-child/sibling
# and top-level frame-local & TX-level-detention exceed tests — passes with the mutant
# applied, confirming no observable difference.
[[suppress]]
kind = "line"
file = "crates/mega-evm/src/limit/limit.rs"
mutant = "replace && with || in AdditionalLimit::before_frame_return_result"
justification = "Equivalent: at every <true> (last_frame_result) call has_active_frame() is already false (the frame was popped by the preceding <false> frame_return_result pass), so LAST_FRAME && !has_active == LAST_FRAME || !has_active == true; at <false> calls LAST_FRAME is false in both. Full suite (incl. all multi-frame exceed tests) green with the mutant."
reviewer = "improve-mutation-score (William Aaron Cheung)"

