# Mutation-testing suppressions.
#
# A suppressed mutant is one that survives the test suite but is NOT a test gap:
# it is either an *equivalent mutant* (cannot change observable behavior) or
# dead/defensive code that is impractical-but-correct to leave unkillable.
#
# Suppressing a mutant requires a justification and a reviewer. Adding an entry
# here is a reviewed decision — treat it with the same scrutiny as disabling a
# test. The PR gate (scripts/mutation_gate.py) excludes these from "new survivor"
# accounting.
#
# Two granularities (the "hybrid" model):
#   kind = "function"  -> matched as an --exclude-re against the mutant NAME.
#                         Use for whole functions that are entirely equivalent or
#                         dead (stable across line moves). `pattern` is a regex.
#   kind = "line"      -> matched against the exact mutant description line from
#                         missed.txt. Use for a single surviving mutant inside an
#                         otherwise-tested function. `mutant` is the literal text
#                         (without the leading "file:line:col: ").
#
# Inline `#[mutants::skip]` on a function is also honored natively by
# cargo-mutants and is appropriate for truly dead helpers; prefer this file when
# the decision needs a recorded justification.

# ─────────────────────────────────────────────────────────────────────────────
# crates/mega-evm/src/limit/ survivors.
#
# The real test gap here — `AdditionalLimit::before_frame_run -> None`
# (limit.rs:585) — is closed behaviorally by
# `crates/mega-evm/tests/mutation/limit.rs`. The remaining survivors below are
# provably equivalent / dead and are recorded here with justification.

