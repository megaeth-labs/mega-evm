# --- DeterministicHasher::write line-125 `|` combine (equivalent) ------------------
# `let combined = (value[0] as u128) | ((value[1] as u128) << 64);` where
# `value: [u64; 2] = read_small(data)`. The first operand `value[0] as u128` is a u64 widened
# to u128, so it occupies ONLY bits 0..63 (bits 64..127 are always zero). The second operand
# `(value[1] as u128) << 64` occupies ONLY bits 64..127 (bits 0..63 are always zero). The two
# operands therefore have DISJOINT set bits for every possible input, so `a | b == a ^ b`
# identically — `|` and `^` agree on all inputs at this site. This is structurally guaranteed
# by the u64->u128 widening + 64-bit shift, independent of the bytes hashed, so no reachable
# input distinguishes `|` from `^` here. (Pinning a specific bucket id, e.g. for "hello",
# cannot kill it: the combined value — and thus the hash and bucket id — is identical under
# the mutant.) The sibling line-120 `|` combine over `front`/`back<<64` is the same shape but
# is already pinned by `ahash_bucket_id_mid_input_is_pinned`; line 125 is the small-input
# branch and is the equivalent one.
[[suppress]]
kind = "line"
file = "crates/mega-evm/src/external/hasher/fallback.rs"
mutant = "replace | with ^ in <impl core::hash::Hasher for DeterministicHasher>::write"
justification = "Equivalent: `(value[0] as u128) | ((value[1] as u128) << 64)` ORs a u64-widened low half (bits 0..63 only) with a u64-widened high half shifted into bits 64..127 only. The operands have disjoint set bits by construction for every input, so | == ^ identically; no reachable input distinguishes them."
reviewer = "improve-mutation-score"

# --- DeterministicHasher typed write_uN / update mutants (dead: unreachable from public API) -------
# `AHashBucketHasher` — the crate's ONLY public hasher — computes bucket ids via
# `hash(bytes)` (hasher/mod.rs), which calls `DeterministicHasher::write(&[u8])` (the slice
# write) and `finish()`. The slice `write` routes exclusively through `large_update`; it
# never calls the typed `write_u8/u16/u32/u64/u128` methods nor the `update` helper.
#
# `update` is reached ONLY from `write_u8/u16/u32/u64` (and `write_usize` -> `write_u64`);
# those typed `write_uN` methods are reached ONLY through `core::hash::Hasher` trait dispatch.
# `DeterministicHasher` / `RandomState` are `pub(crate)` and are NOT re-exported, so no
# integration test (a separate crate) can construct a hasher and drive the typed writes; and
# a grep of the whole `mega-evm` src confirms ZERO non-test callers of any typed `write_uN`,
# `.update(`, `build_hasher`, `DeterministicHasher`, or `RandomState` outside the hasher
# module itself. The typed methods exist solely to satisfy the `core::hash::Hasher` trait
# contract; they are dead with respect to every reachable code path of the public API.
#
# Because they are unreachable, mutating them (`write_uN -> ()`, or `^` -> `|`/`&` inside the
# dead `update`) cannot change any observable output of `AHashBucketHasher::bucket_id` (the
# full mega-evm suite is green with each mutant applied). The inline `#[cfg(test)]` unit test
# `test_hasher_typed_write_methods` does exercise them via the crate-internal `RandomState`,
# but the mutation run builds the integration test targets only, so that unit test cannot
# kill them — and the public API offers no path to do so. Recorded here as dead code.
